name: Export Modpack

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Add Go bin directory to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Export CurseForge pack (Client)
        run: packwiz cf export -s client

      - name: Export CurseForge pack (Server)
        run: packwiz cf export -s server

      - name: Find exported archives
        id: archives
        run: |
          latest_zips=$(find . -maxdepth 1 -type f -name '*.zip' -printf '%T@ %p\n' | sort -n | tail -2 | cut -d ' ' -f2-)
          zips_array=($latest_zips)
          if [ ${#zips_array[@]} -lt 2 ]; then
            echo "Expected 2 exported zips (client and server), found ${#zips_array[@]}"
            exit 1
          fi
          echo "client=${zips_array[0]}" >> "$GITHUB_OUTPUT"
          echo "server=${zips_array[1]}" >> "$GITHUB_OUTPUT"
          echo "client_name=$(basename "${zips_array[0]}")" >> "$GITHUB_OUTPUT"
          echo "server_name=$(basename "${zips_array[1]}")" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        if: github.ref_type == 'tag'
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload to CurseForge (Client)
        if: github.ref_type == 'tag'
        run: |
          curl -X POST \
            -H "X-API-Token: ${{ secrets.CURSEFORGE_API_TOKEN }}" \
            -F "file=@${{ steps.archives.outputs.client }}" \
            -F "type=release" \
            "https://minecraft.curseforge.com/api/projects/1537471/upload-file"

      - name: Upload to CurseForge (Server)
        if: github.ref_type == 'tag'
        run: |
          curl -X POST \
            -H "X-API-Token: ${{ secrets.CURSEFORGE_API_TOKEN }}" \
            -F "file=@${{ steps.archives.outputs.server }}" \
            -F "type=release" \
            "https://minecraft.curseforge.com/api/projects/1537471/upload-file"

      - name: Upload release assets (Client & Server)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.archives.outputs.client }}
            ${{ steps.archives.outputs.server }}
          fail_on_unmatched_files: true

      - name: Upload workflow artifacts (Client & Server)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: modpack-exports
          path: |
            ${{ steps.archives.outputs.client }}
            ${{ steps.archives.outputs.server }}
          if-no-files-found: error