name: "BaldursCraft Songpack"
version: "1.1"
author: "zick407"
description: "Feel yourself in a real RPG adventure!"
credits: "Larian Studios, Borislav Slavov, Kirill Pokrovsky"

musicSwitchSpeed: SHORT
musicDelayLength: NONE



